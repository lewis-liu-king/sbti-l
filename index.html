<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>灵魂解码 · 人格测试</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a1a;--card:rgba(255,255,255,0.05);--card-hover:rgba(255,255,255,0.1);
  --primary:#7c3aed;--primary-glow:rgba(124,58,237,0.4);
  --secondary:#10b981;--secondary-glow:rgba(16,185,129,0.4);
  --tertiary:#f59e0b;--tertiary-glow:rgba(245,158,11,0.4);
  --text:#e2e8f0;--muted:#64748b;--border:rgba(255,255,255,0.08);
  --danger:#ef4444;--radius:16px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Noto Serif SC','PingFang SC','Microsoft YaHei',sans-serif;-webkit-tap-highlight-color:transparent}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;pointer-events:none}
#app{position:relative;z-index:1;width:100%;height:100%;max-width:480px;margin:0 auto;overflow:hidden}
.page{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;
  opacity:0;transform:translateX(60px);transition:all .5s cubic-bezier(.4,0,.2,1);pointer-events:none;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page.active{opacity:1;transform:translateX(0);pointer-events:auto}
.page.exit-left{opacity:0;transform:translateX(-60px)}

/* ===== HOME PAGE ===== */
.home-content{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100%;padding:40px 24px;text-align:center;position:relative}
.logo-area{margin-bottom:48px}
.logo-icon{font-size:64px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
.title{font-size:52px;font-weight:900;letter-spacing:4px;
  background:linear-gradient(135deg,var(--primary),#a78bfa,var(--secondary));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:glow-text 3s ease-in-out infinite alternate;filter:drop-shadow(0 0 20px var(--primary-glow))}
.subtitle{font-size:28px;font-weight:700;margin-top:4px;color:var(--text);letter-spacing:8px}
.tagline{font-size:15px;color:var(--muted);margin-top:12px;letter-spacing:2px}
.personality-count{font-size:13px;color:var(--tertiary);margin-top:8px;letter-spacing:1px;opacity:.8}

.btn-start{position:relative;padding:16px 64px;font-size:18px;font-weight:700;font-family:inherit;
  color:#fff;background:linear-gradient(135deg,var(--primary),#6d28d9);border:none;border-radius:50px;
  cursor:pointer;overflow:hidden;transition:all .3s;letter-spacing:2px;
  box-shadow:0 0 30px var(--primary-glow),0 0 60px rgba(124,58,237,0.2)}
.btn-start::before{content:'';position:absolute;top:-2px;left:-2px;right:-2px;bottom:-2px;
  border-radius:52px;background:linear-gradient(135deg,var(--primary),var(--secondary),var(--tertiary));
  z-index:-1;animation:rotate-border 3s linear infinite;opacity:0;transition:opacity .3s}
.btn-start:hover::before,.btn-start:active::before{opacity:1}
.btn-start:active{transform:scale(.96)}
.btn-start .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);
  transform:scale(0);animation:ripple .6s ease-out}

.daily-card{display:flex;align-items:center;gap:12px;margin-top:32px;padding:16px 24px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;transition:all .3s;backdrop-filter:blur(10px);width:100%;max-width:320px}
.daily-card:active{transform:scale(.97);background:var(--card-hover)}
.daily-icon{font-size:24px}
.daily-card span:nth-child(2){flex:1;text-align:left;font-size:15px}
.arrow{color:var(--muted);font-size:18px}

.counter{margin-top:40px;font-size:13px;color:var(--muted);letter-spacing:1px}
.counter b{color:var(--secondary);font-weight:700}

.has-result-hint{margin-top:16px;padding:10px 20px;font-size:13px;color:var(--tertiary);
  border:1px solid rgba(245,158,11,.3);border-radius:20px;cursor:pointer;transition:all .3s}
.has-result-hint:active{background:rgba(245,158,11,.1)}

/* ===== QUIZ PAGE ===== */
.quiz-header{padding:16px 20px 0;flex-shrink:0}
.progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.progress-bar{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;width:0;border-radius:2px;
  background:linear-gradient(90deg,var(--primary),var(--secondary),var(--tertiary));
  background-size:200% 100%;animation:gradient-shift 2s ease infinite;transition:width .4s ease}
.question-num{font-size:13px;color:var(--muted);white-space:nowrap}

.quiz-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px;overflow:hidden}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px 24px;margin-bottom:24px;backdrop-filter:blur(10px);
  animation:card-in .4s ease-out}
.question-text{font-size:17px;line-height:1.7;font-weight:400}

.options{display:flex;flex-direction:column;gap:12px}
.option-card{display:flex;align-items:center;gap:14px;padding:18px 20px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;transition:all .25s;position:relative;overflow:hidden;backdrop-filter:blur(10px);
  animation:option-in .4s ease-out both}
.option-card:nth-child(1){animation-delay:.05s}
.option-card:nth-child(2){animation-delay:.1s}
.option-card:nth-child(3){animation-delay:.15s}
.option-card:active{transform:scale(.97)}
.option-card.selected{border-color:var(--primary);background:rgba(124,58,237,.12);
  box-shadow:0 0 20px var(--primary-glow)}
.option-card.selected .option-label{background:var(--primary);color:#fff}
.option-label{width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;border:1px solid var(--border);font-size:14px;font-weight:700;
  flex-shrink:0;transition:all .25s}
.option-text{font-size:15px;line-height:1.5}

/* ===== RESULT PAGE ===== */
.result-content{display:flex;flex-direction:column;align-items:center;min-height:100%;
  padding:40px 24px;text-align:center;overflow-y:auto}

.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:24px}
.loading-spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--primary);
  border-radius:50%;animation:spin 1s linear infinite}
.loading-text{font-size:16px;color:var(--muted);animation:pulse 1.5s ease-in-out infinite}

.result-reveal{display:none;flex-direction:column;align-items:center;width:100%;animation:result-in .8s ease-out}
.result-reveal.show{display:flex}

.result-emoji{font-size:72px;margin-bottom:8px;animation:bounce-in .6s cubic-bezier(.68,-.55,.27,1.55)}
.result-code{font-size:42px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.result-name{font-size:24px;font-weight:700;margin-bottom:20px;opacity:0;animation:fade-up .5s .3s forwards}
.result-quote{font-size:16px;font-style:italic;color:var(--muted);margin-bottom:8px;
  padding:0 20px;opacity:0;animation:fade-up .5s .5s forwards}
.result-desc{font-size:14px;line-height:1.8;color:var(--text);max-width:340px;margin-bottom:32px;
  opacity:0;animation:fade-up .5s .7s forwards}

.radar-section{width:100%;max-width:340px;margin-bottom:32px;opacity:0;animation:fade-up .5s .9s forwards}
.radar-section h3{font-size:14px;color:var(--muted);margin-bottom:12px;letter-spacing:2px}
#radar-canvas{width:100%;border-radius:var(--radius)}

.result-buttons{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px;
  opacity:0;animation:fade-up .5s 1.1s forwards}
.btn-result{padding:14px 24px;font-size:15px;font-weight:700;font-family:inherit;
  border:none;border-radius:50px;cursor:pointer;transition:all .3s;letter-spacing:1px}
.btn-result:active{transform:scale(.96)}
.btn-primary{color:#fff;background:linear-gradient(135deg,var(--primary),#6d28d9);
  box-shadow:0 4px 20px var(--primary-glow)}
.btn-secondary{color:var(--text);background:var(--card);border:1px solid var(--border);
  backdrop-filter:blur(10px)}
.btn-ghost{color:var(--muted);background:transparent;border:1px solid var(--border)}

/* ===== SHARE PAGE ===== */
.share-content{display:flex;flex-direction:column;align-items:center;padding:24px;min-height:100%}
.share-content h2{font-size:20px;margin-bottom:20px;letter-spacing:2px}
.poster-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px;margin-bottom:20px;backdrop-filter:blur(10px)}
#poster-canvas{border-radius:12px;display:block;max-width:100%}
.share-hint{text-align:center;font-size:13px;color:var(--muted);margin-bottom:16px}
.share-actions{display:flex;gap:12px;width:100%;max-width:320px}
.share-actions .btn-result{flex:1}

/* ===== SQUARE PAGE ===== */
.square-content{padding:20px;min-height:100%;overflow-y:auto}
.square-header{text-align:center;margin-bottom:24px}
.square-header h2{font-size:22px;font-weight:900;margin-bottom:4px;
  background:linear-gradient(135deg,var(--primary),var(--tertiary));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.square-header p{font-size:13px;color:var(--muted)}

.dist-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;margin-bottom:16px;backdrop-filter:blur(10px)}
.dist-card h3{font-size:14px;color:var(--muted);margin-bottom:16px;letter-spacing:1px}
.dist-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.dist-label{font-size:12px;width:60px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dist-track{flex:1;height:20px;background:rgba(255,255,255,.05);border-radius:10px;overflow:hidden}
.dist-fill{height:100%;border-radius:10px;transition:width 1s ease;min-width:2px}
.dist-pct{font-size:11px;color:var(--muted);width:36px;flex-shrink:0}

.rank-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;margin-bottom:16px;backdrop-filter:blur(10px)}
.rank-card h3{font-size:14px;color:var(--muted);margin-bottom:12px;letter-spacing:1px}
.rank-item{display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid var(--border)}
.rank-item:last-child{border:none}
.rank-num{width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-size:12px;font-weight:700;flex-shrink:0}
.rank-num.top{background:var(--tertiary);color:#000}
.rank-num.normal{background:var(--card);color:var(--muted)}
.rank-emoji{font-size:20px}
.rank-name{flex:1;font-size:14px}
.rank-count{font-size:12px;color:var(--muted)}

.feed-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;margin-bottom:16px;backdrop-filter:blur(10px);overflow:hidden;position:relative;height:200px}
.feed-card h3{font-size:14px;color:var(--muted);margin-bottom:12px;letter-spacing:1px}
.feed-list{position:relative;height:150px;overflow:hidden}
.feed-item{position:absolute;white-space:nowrap;font-size:13px;color:var(--text);
  padding:4px 12px;background:rgba(255,255,255,.06);border-radius:12px;
  animation:danmu linear infinite}
.feed-item:nth-child(odd){color:var(--secondary)}
.feed-item:nth-child(even){color:var(--tertiary)}

.invite-card{text-align:center;padding:24px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);backdrop-filter:blur(10px)}
.invite-card p{font-size:14px;color:var(--muted);margin-bottom:12px}
.invite-card .btn-result{display:inline-block}

/* ===== DAILY PAGE ===== */
.daily-content{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100%;padding:40px 24px;text-align:center}
.daily-badge{font-size:13px;color:var(--tertiary);border:1px solid rgba(245,158,11,.3);
  border-radius:20px;padding:6px 16px;margin-bottom:24px;letter-spacing:1px}
.daily-question{font-size:18px;line-height:1.7;margin-bottom:32px;max-width:320px}
.daily-result{display:none;flex-direction:column;align-items:center;animation:result-in .6s ease-out}
.daily-result.show{display:flex}
.daily-result-emoji{font-size:64px;margin-bottom:12px}
.daily-result-text{font-size:20px;font-weight:700;margin-bottom:8px}
.daily-result-desc{font-size:14px;color:var(--muted);margin-bottom:32px}
.daily-teaser{font-size:13px;color:var(--muted);margin-top:24px}

/* ===== ANIMATIONS ===== */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes glow-text{0%{filter:drop-shadow(0 0 20px var(--primary-glow))}
  100%{filter:drop-shadow(0 0 40px var(--primary-glow)) drop-shadow(0 0 80px rgba(124,58,237,.2))}}
@keyframes rotate-border{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
@keyframes ripple{to{transform:scale(4);opacity:0}}
@keyframes gradient-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes card-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes option-in{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes result-in{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes bounce-in{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes fade-up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes danmu{from{transform:translateX(100%)}to{transform:translateX(-100%)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
.disclaimer{padding:20px;text-align:center;color:var(--muted);font-size:12px;line-height:1.8;border-top:1px solid rgba(255,255,255,0.05);margin-top:20px}
.ad-slot{width:100%;min-height:80px;background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;margin:16px 0;border-radius:8px}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>
<div id="app">

  <!-- HOME -->
  <div id="page-home" class="page active">
    <div class="home-content">
      <div class="logo-area">
        <div class="logo-icon">&#129504;</div>
        <h1 class="title">灵魂解码</h1>
        <h2 class="subtitle">人格测试</h2>
        <p class="tagline">40种人格等你解锁</p>
        <p class="personality-count">55道题库 · 每次随机 · 隐藏人格等你发现</p>
      </div>
      <button class="btn-start" id="btn-start">开始测试</button>
      <div id="has-result" class="has-result-hint" style="display:none"></div>
      <div class="daily-card" id="btn-daily">
        <span class="daily-icon">&#128197;</span>
        <span>每日一题</span>
        <span class="arrow">&#8594;</span>
      </div>
      <p class="counter">已有 <b id="test-count">0</b> 人完成测试</p>
      <div class="disclaimer"><p>本测试仅供娱乐参考，不构成任何心理学评估或诊断</p><p>&copy; 2026 灵魂解码 Soul Decode &middot; 保留所有权利</p></div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="page-quiz" class="page">
    <div class="quiz-header">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <span class="question-num" id="question-num">第 1 / 31 题</span>
      </div>
    </div>
    <div class="quiz-body">
      <div class="question-card" id="question-card">
        <p class="question-text" id="question-text"></p>
      </div>
      <div class="options" id="options-container"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="page-result" class="page">
    <div class="result-content">
      <div class="loading-state" id="loading-state">
        <div class="loading-spinner"></div>
        <p class="loading-text">正在分析你的人格...</p>
      </div>
      <div class="result-reveal" id="result-reveal">
        <div class="result-emoji" id="result-emoji"></div>
        <div class="result-code" id="result-code"></div>
        <div class="result-name" id="result-name"></div>
        <div class="result-quote" id="result-quote"></div>
        <div class="result-desc" id="result-desc"></div>
        <div class="radar-section">
          <h3>十五维度分析</h3>
          <canvas id="radar-canvas" width="680" height="680"></canvas>
        </div>
        <div class="ad-slot" id="ad-result-bottom"><!-- 广告位 --></div>
        <div class="result-buttons">
          <button class="btn-result btn-primary" id="btn-share">生成分享海报</button>
          <button class="btn-result btn-secondary" id="btn-square">去广场看看</button>
          <button class="btn-result btn-ghost" id="btn-retry">再测一次</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SHARE -->
  <div id="page-share" class="page">
    <div class="share-content">
      <h2>分享海报</h2>
      <div class="poster-wrap"><canvas id="poster-canvas" width="750" height="1334"></canvas></div>
      <p class="share-hint">长按图片保存，分享给好友</p>
      <div class="share-actions">
        <button class="btn-result btn-primary" id="btn-save">保存图片</button>
        <button class="btn-result btn-secondary" id="btn-back-result">返回结果</button>
      </div>
    </div>
  </div>

  <!-- SQUARE -->
  <div id="page-square" class="page">
    <div class="square-content">
      <div class="ad-slot" id="ad-square-top"><!-- 广告位 --></div>
      <div class="square-header">
        <h2>人格广场</h2>
        <p>实时人格分布与热门排行</p>
      </div>
      <div class="dist-card"><h3>今日人格分布</h3><div id="dist-bars"></div></div>
      <div class="rank-card"><h3>最热门人格 TOP 5</h3><div id="rank-list"></div></div>
      <div class="feed-card"><h3>实时测试动态</h3><div class="feed-list" id="feed-list"></div></div>
      <div class="invite-card">
        <p>你的好友是什么人格？</p>
        <button class="btn-result btn-primary" id="btn-invite">邀请好友测试</button>
      </div>
    </div>
  </div>

  <!-- DAILY -->
  <div id="page-daily" class="page">
    <div class="daily-content" id="daily-content"></div>
  </div>

</div>

<script>
// ==================== DATA ====================
const DIMS = ['S1','S2','S3','E1','E2','E3','A1','A2','A3','Ac1','Ac2','Ac3','So1','So2','So3'];
const DIM_LABELS = ['自尊','清晰','价值','安全','投入','边界','世界','灵活','意义','动机','决策','执行','社交','距离','真实'];
const DIM_NAMES = {
  S1:'自尊自信',S2:'自我清晰度',S3:'核心价值',E1:'依恋安全感',E2:'情感投入度',E3:'边界与依赖',
  A1:'世界观倾向',A2:'规则与灵活度',A3:'人生意义感',Ac1:'动机导向',Ac2:'决策风格',Ac3:'执行模式',
  So1:'社交主动性',So2:'人际边界感',So3:'表达与真实度'
};

const QUESTIONS = [
  // ===== 原始31题 =====
  {id:1,text:'我在不同的人面前，会表现出完全不一样的自己',dim:'So3',opts:['完全不是','偶尔会','经常如此'],rev:true},
  {id:2,text:'我讨厌自己的计划被突然打破',dim:'A2',opts:['无所谓','有点不爽','非常讨厌'],rev:false},
  {id:3,text:'我和人相处自带电子围栏，别人靠太近我会本能抗拒',dim:'So2',opts:['没有围栏','看情况','是的'],rev:false},
  {id:4,text:'伴侣超过5小时不回消息，借口是身体不适，你会怀疑对方撒谎吗？',dim:'E1',opts:['不会怀疑','有点怀疑','肯定在撒谎'],rev:true},
  {id:5,text:'我心里有负面想法，却很少说出口，大多是碍于情面',dim:'So3',opts:['我会说出来','看情况','很少说出口'],rev:true},

// ==================== PARTICLES ====================
let particles=[];
function initBg(){
  let c=$('#bg-canvas'),ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<60;i++){
    particles.push({x:Math.random()*c.width,y:Math.random()*c.height,
      vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
      r:Math.random()*2+.5,a:Math.random()*.5+.1,
      color:['#7c3aed','#10b981','#f59e0b','#6366f1'][rand(0,3)]});
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;
      if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color;ctx.globalAlpha=p.a;ctx.fill();
    });
    ctx.globalAlpha=1;
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        let dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
        let d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle='rgba(124,58,237,'+(1-d/120)*.08+')';ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
}

// ==================== CONFETTI ====================
let confettiParts=[],confettiRunning=false;
function launchConfetti(){
  let c=$('#confetti-canvas'),ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  confettiParts=[];
  let colors=['#7c3aed','#10b981','#f59e0b','#ec4899','#3b82f6','#ef4444','#fbbf24'];
  for(let i=0;i<120;i++){
    confettiParts.push({x:rand(0,c.width),y:rand(-c.height,0),
      vx:(Math.random()-.5)*4,vy:Math.random()*3+2,
      w:rand(6,12),h:rand(4,8),rot:Math.random()*360,
      rv:(Math.random()-.5)*10,color:colors[rand(0,colors.length-1)],a:1});
  }
  confettiRunning=true;
  function draw(){
    if(!confettiRunning)return;
    ctx.clearRect(0,0,c.width,c.height);
    let alive=false;
    confettiParts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.rot+=p.rv;
      if(p.y>c.height+20)p.a-=.02;
      if(p.a<=0)return;
      alive=true;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=p.a;ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
    });
    ctx.globalAlpha=1;
    if(alive)requestAnimationFrame(draw);
    else{confettiRunning=false;ctx.clearRect(0,0,c.width,c.height)}
  }
  draw();
}

function startQuiz(){
  state.answers={};state.currentIdx=0;state.showExtra=false;
  // 从55题题库中随机抽取31题，确保每个维度至少有2题
  let byDim={};
  QUESTIONS.forEach(q=>{if(!byDim[q.dim])byDim[q.dim]=[];byDim[q.dim].push(q)});
  let selected=[];
  // 每个维度先随机抽2题
  DIMS.forEach(dim=>{
    let pool=byDim[dim]||[];
    let picked=shuffle(pool).slice(0,2);
    selected.push(...picked);
  });
  // 如果不够31题，从剩余题中随机补
  let selectedIds=new Set(selected.map(q=>q.id));
  let remaining=QUESTIONS.filter(q=>!selectedIds.has(q.id));
  remaining=shuffle(remaining);
  while(selected.length<31&&remaining.length>0){
    selected.push(remaining.shift());
  }
  // 打乱顺序
  selected=shuffle(selected);
  // 在中间随机位置插入爱好题
  let hobbyPos=rand(3,selected.length-2);
  selected.splice(hobbyPos,0,HOBBY_Q);
  state.shuffled=selected;
  navigate('quiz');
  setTimeout(()=>renderQuestion(),100);
}

function renderQuestion(){
  let q=state.shuffled[state.currentIdx];
  if(!q)return;
  let total=state.shuffled.length;
  let pct=((state.currentIdx)/total*100);
  $('#progress-fill').style.width=pct+'%';
  $('#question-num').textContent='第 '+(state.currentIdx+1)+' / '+total+' 题';

  let card=$('#question-card');
  card.style.animation='none';card.offsetHeight;card.style.animation='card-in .4s ease-out';
  $('#question-text').textContent=q.text;

  let container=$('#options-container');
  container.innerHTML='';
  let labels=['A','B','C'];
  q.opts.forEach((opt,i)=>{
    let div=document.createElement('div');
    div.className='option-card';
    div.innerHTML='<span class="option-label">'+labels[i]+'</span><span class="option-text">'+opt+'</span>';
    div.addEventListener('click',()=>selectOption(q,i+1,div));
    container.appendChild(div);
  });
}

function selectOption(q,val,el){
  $$('.option-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');

  setTimeout(()=>{
    if(q.id===99){
      // Hobby question
      if(val===3){
        // Selected 旅行探索 - show extra question
        state.showExtra=true;
        state.shuffled.splice(state.currentIdx+1,0,EXTRA_Q);
        state.currentIdx++;
        renderQuestion();
        return;
      }
    }
    if(q.id===98){
      // Extra travel question
      if(val===2){
        // 宅在家里云旅游 - assign HIDDEN
        state.result=PERSONALITIES.find(p=>p.code==='HIDDEN');
        state.scores=DIMS.map(()=>2);
        save();
        showResult();
        return;
      }
    }

    if(q.dim){
      let v=q.rev?(4-val):val;
      if(!state.answers[q.dim])state.answers[q.dim]=[];
      state.answers[q.dim].push(v);
    }

    state.currentIdx++;
    if(state.currentIdx>=state.shuffled.length){
      calculateResult();
    }else{
      renderQuestion();
    }
  },300);
}

// ==================== SCORING ====================
function calculateResult(){
  let scores=DIMS.map(dim=>{
    let vals=state.answers[dim]||[];
    if(vals.length===0)return 2;
    return vals.reduce((a,b)=>a+b,0)/vals.length;
  });
  state.scores=scores;

  let pattern=scores.map(s=>{
    if(s<=1.5)return'L';if(s<=2.5)return'M';return'H';
  }).join('');

  // Find closest match (excluding hidden unless special)
  let best=null,bestDist=999;
  PERSONALITIES.filter(p=>!p.hidden).forEach(p=>{
    let d=hamming(pattern,p.pattern);
    if(d<bestDist){bestDist=d;best=p}
  });

  // Check for HIDDEN (all L)
  if(pattern==='LLLLLLLLLLLLLLL'){
    best=PERSONALITIES.find(p=>p.code==='HIDDEN');
  }
  // Check for GOD (all H)
  if(pattern==='HHHHHHHHHHHHHHH'){
    best=PERSONALITIES.find(p=>p.code==='GOD');
  }
  // Check for WATCH (mostly L, <=3 M/H)
  let lCount=(pattern.match(/L/g)||[]).length;
  if(lCount>=13&&pattern!=='LLLLLLLLLLLLLLL'){
    let ghostP=PERSONALITIES.find(p=>p.code==='WATCH');
    if(ghostP)best=ghostP;
  }

  state.result=best;
  save();
  showResult();
}

function hamming(a,b){
  let d=0;for(let i=0;i<a.length;i++)if(a[i]!==b[i])d++;return d;
}

function lighten(hex,pct){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+Math.round((255-r)*pct/100));
  g=Math.min(255,g+Math.round((255-g)*pct/100));
  b=Math.min(255,b+Math.round((255-b)*pct/100));
  return '#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('');
}

// ==================== RADAR CHART ====================
function drawRadar(canvas,scores,color){
  let ctx=canvas.getContext('2d');
  let w=canvas.width,h=canvas.height;
  let cx=w/2,cy=h/2;
  let r=Math.min(cx,cy)-70;
  let n=15;
  let step=Math.PI*2/n;
  let start=-Math.PI/2;

  ctx.clearRect(0,0,w,h);

  // Grid
  for(let lv=1;lv<=5;lv++){
    let lr=r*(lv/5);
    ctx.beginPath();
    for(let i=0;i<=n;i++){
      let a=start+i*step;
      let x=cx+lr*Math.cos(a),y=cy+lr*Math.sin(a);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle='rgba(255,255,255,'+(lv===5?.12:.06)+')';
    ctx.lineWidth=1;ctx.stroke();
  }

  // Axes
  for(let i=0;i<n;i++){
    let a=start+i*step;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.stroke();
  }

  // Data
  ctx.beginPath();
  for(let i=0;i<=n;i++){
    let idx=i%n;
    let a=start+idx*step;
    let v=(scores[idx]||2)/3;
    let x=cx+r*v*Math.cos(a),y=cy+r*v*Math.sin(a);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle=color+'30';ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.stroke();

  // Dots
  for(let i=0;i<n;i++){
    let a=start+i*step;
    let v=(scores[i]||2)/3;
    let x=cx+r*v*Math.cos(a),y=cy+r*v*Math.sin(a);
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=color;ctx.fill();
    ctx.strokeStyle='#0a0a1a';ctx.lineWidth=1.5;ctx.stroke();
  }

  // Labels
  ctx.fillStyle='#94a3b8';ctx.font='bold 22px "Noto Serif SC",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=0;i<n;i++){
    let a=start+i*step;
    let lx=cx+(r+36)*Math.cos(a),ly=cy+(r+36)*Math.sin(a);
    ctx.fillText(DIM_LABELS[i],lx,ly);
  }
}

// ==================== POSTER ====================
function generatePoster(){
  let c=$('#poster-canvas'),ctx=c.getContext('2d');
  let w=750,h=1334,r=state.result,scores=state.scores;
  ctx.clearRect(0,0,w,h);

  // Background gradient
  let bg=ctx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'#0f0f2a');bg.addColorStop(0.5,'#0a0a1a');bg.addColorStop(1,'#0f0f2a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);

  // Decorative circles
  ctx.globalAlpha=.06;
  ctx.beginPath();ctx.arc(600,200,300,0,Math.PI*2);ctx.fillStyle=r.color;ctx.fill();
  ctx.beginPath();ctx.arc(100,1000,200,0,Math.PI*2);ctx.fillStyle=r.color;ctx.fill();
  ctx.globalAlpha=1;

  // Top branding
  ctx.fillStyle='#64748b';ctx.font='28px sans-serif';ctx.textAlign='center';
  ctx.fillText('灵魂解码 · 人格测试',w/2,60);

  // Divider
  ctx.beginPath();ctx.moveTo(100,85);ctx.lineTo(w-100,85);
  let lineGrad=ctx.createLinearGradient(100,0,w-100,0);
  lineGrad.addColorStop(0,'transparent');lineGrad.addColorStop(0.5,r.color+'60');lineGrad.addColorStop(1,'transparent');
  ctx.strokeStyle=lineGrad;ctx.lineWidth=1;ctx.stroke();

  // Emoji - decode HTML entities to unicode
  let emojiText=r.emoji;
  let temp=document.createElement('textarea');
  temp.innerHTML=emojiText;
  emojiText=temp.value;
  ctx.font='100px sans-serif';ctx.fillText(emojiText,w/2,210);

  // Code
  ctx.font='bold 80px "Noto Serif SC",sans-serif';
  let codeGrad=ctx.createLinearGradient(w/2-100,0,w/2+100,0);
  codeGrad.addColorStop(0,r.color);codeGrad.addColorStop(1,lighten(r.color,30));
  ctx.fillStyle=codeGrad;ctx.fillText(r.code,w/2,310);

  // Name
  ctx.font='bold 44px "Noto Serif SC",sans-serif';ctx.fillStyle='#e2e8f0';
  ctx.fillText(r.name,w/2,370);

  // Quote
  ctx.font='italic 30px "Noto Serif SC",sans-serif';ctx.fillStyle=r.color;
  ctx.fillText('"'+r.quote+'"',w/2,430);

  // Description
  ctx.font='26px "Noto Serif SC",sans-serif';ctx.fillStyle='#94a3b8';
  wrapText(ctx,r.desc,w/2,490,560,38);

  // Mini radar
  let radarSize=340,radarX=w/2-radarSize/2,radarY=620;
  let miniCanvas=document.createElement('canvas');
  miniCanvas.width=radarSize*2;miniCanvas.height=radarSize*2;
  drawRadar(miniCanvas,scores,r.color);
  ctx.drawImage(miniCanvas,radarX,radarY,radarSize,radarSize);

  // Bottom branding
  ctx.fillStyle='#334155';ctx.font='24px sans-serif';
  ctx.fillText('扫码或搜索「灵魂解码」',w/2,1040);

  // QR Code - generate REAL scannable QR code using qrcode-generator library
  let qrSize=120,qrX=w/2-qrSize/2,qrY=1060;
  let urlStr=location.href||'https://lewis-liu-king.github.io/sbti-l/';
  // Create QR code (type 0 = auto, error correction level L)
  let qr=qrcode(0,'L');
  qr.addData(urlStr);
  qr.make();
  let qrModuleCount=qr.getModuleCount();
  let qrCellSize=qrSize/qrModuleCount;
  // Draw QR code
  ctx.fillStyle='#e2e8f0';
  for(let row=0;row<qrModuleCount;row++){
    for(let col=0;col<qrModuleCount;col++){
      if(qr.isDark(row,col)){
        ctx.fillRect(qrX+col*qrCellSize,qrY+row*qrCellSize,qrCellSize,qrCellSize);
      }
    }
  }

  // Footer
  ctx.fillStyle='#1e293b';ctx.font='22px sans-serif';
  ctx.fillText('40种人格等你解锁 · 灵魂解码',w/2,1280);
}

function wrapText(ctx,text,x,y,maxW,lineH){
  let words=text.split('');let line='';
  for(let i=0;i<words.length;i++){
    let test=line+words[i];
    if(ctx.measureText(test).width>maxW&&line.length>0){
      ctx.fillText(line,x,y);line=words[i];y+=lineH;
    }else{line=test}
  }
  ctx.fillText(line,x,y);
}

// ==================== DAILY ====================
function renderDaily(){
  let dayIdx=new Date().getDate()%DAILY_QUESTIONS.length;
  let dq=DAILY_QUESTIONS[dayIdx];
  let container=$('#daily-content');

  if(state.dailyAnswered){
    let saved=JSON.parse(localStorage.getItem('sbti_daily_'+dayIdx)||'null');
    if(saved!==null){
      container.innerHTML='<div class="daily-badge">每日一题</div>'+
        '<div class="daily-result show"><div class="daily-result-emoji">&#127881;</div>'+
        '<div class="daily-result-text">'+dq.results[saved]+'</div>'+
        '<div class="daily-result-desc">'+dq.descs[saved]+'</div>'+
        '<button class="btn-result btn-primary" onclick="navigate(\'home\')">返回首页</button>'+
        '<p class="daily-teaser">明天再来解锁新题目</p></div>';
      return;
    }
  }

  container.innerHTML='<div class="daily-badge">每日一题</div>'+
    '<div class="daily-question">'+dq.q+'</div>'+
    '<div class="options" id="daily-options"></div>';

  let labels=['A','B','C'];
  let optsContainer=$('#daily-options');
  dq.opts.forEach((opt,i)=>{
    let div=document.createElement('div');
    div.className='option-card';
    div.innerHTML='<span class="option-label">'+labels[i]+'</span><span class="option-text">'+opt+'</span>';
    div.addEventListener('click',()=>{
      $$('#daily-options .option-card').forEach(c=>c.classList.remove('selected'));
      div.classList.add('selected');
      setTimeout(()=>{
        state.dailyAnswered=true;
        localStorage.setItem('sbti_daily_'+dayIdx,i);
        renderDaily();
      },400);
    });
    optsContainer.appendChild(div);
  });
}

// ==================== INIT ====================
function checkResult(){
  if(state.result){
    $('#has-result').style.display='block';
    $('#has-result').textContent='你上次测出了 '+state.result.code+' '+state.result.name+'，点击查看';
    $('#has-result').onclick=()=>showResult();
  }else{
    $('#has-result').style.display='none';
  }
}

function init(){
  load();
  initBg();

  // Random test count
  $('#test-count').textContent=(rand(10000,99999)).toLocaleString();

  // Button events
  $('#btn-start').addEventListener('click',function(e){
    let ripple=document.createElement('span');ripple.className='ripple';
    let rect=this.getBoundingClientRect();
    ripple.style.width=ripple.style.height='20px';
    ripple.style.left=(e.clientX-rect.left-10)+'px';
    ripple.style.top=(e.clientY-rect.top-10)+'px';
    this.appendChild(ripple);
    setTimeout(()=>ripple.remove(),600);
    startQuiz();
  });

  $('#btn-daily').addEventListener('click',()=>navigate('daily'));
  $('#btn-share').addEventListener('click',()=>navigate('share'));
  $('#btn-square').addEventListener('click',()=>navigate('square'));
  $('#btn-retry').addEventListener('click',()=>{state.result=null;state.scores=null;localStorage.removeItem('sbti_state');startQuiz()});
  $('#btn-save').addEventListener('click',()=>{
    let c=$('#poster-canvas');
    let link=document.createElement('a');
    link.download='soul-decode-'+state.result.code+'-'+state.result.name+'.png';
    link.href=c.toDataURL('image/png');
    link.click();
  });
  $('#btn-back-result').addEventListener('click',()=>navigate('result'));
  $('#btn-invite').addEventListener('click',()=>{
    if(navigator.share){
      navigator.share({title:'灵魂解码 · 人格测试',text:'我测出了'+state.result?.code+' '+state.result?.name+'！你也来测测吧',url:location.href}).catch(()=>{});
    }else{
      navigate('home');
    }
  });

  // Hash routing
  let hash=location.hash.replace('#','');
  if(hash&&$('#page-'+hash)){navigate(hash)}
  else{checkResult()}
}

document.addEventListener('DOMContentLoaded',init);
</script>
